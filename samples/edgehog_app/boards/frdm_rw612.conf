# Enable the WiFi
CONFIG_WIFI_NXP=y

# Use a large log buffer size
CONFIG_LOG_BUFFER_SIZE=32768

# Enable the file transfer
CONFIG_EDGEHOG_DEVICE_FILE_TRANSFER=y
CONFIG_EDGEHOG_DEVICE_FILE_TRANSFER_HTTPS_CA_CERT_TAG=4
CONFIG_EDGEHOG_DEVICE_FILE_TRANSFER_COMPRESSION=y
CONFIG_EDGEHOG_DEVICE_FILE_TRANSFER_TAR=y
