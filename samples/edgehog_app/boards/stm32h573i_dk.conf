# Unfortunately this board does not have the resources for this feature.
CONFIG_EDGEHOG_DEVICE_FILE_TRANSFER_COMPRESSION=n

# Enable LZ4 compression
CONFIG_LZ4=n
CONFIG_LZ4_FRAME_SUPPORT=n

# Use a small log buffer size
CONFIG_LOG_BUFFER_SIZE=2048
