# NOTE: This manifest can be used to setup the minimum supported version of Zephry LTS for the
# automated compatibility checks.

manifest:

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: astarte-platform
      url-base: https://github.com/astarte-platform

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.3.0
      import:
        name-allowlist:
          - cmsis_6
          - hal_nxp
          - hal_espressif
          - hal_stm32
          - mbedtls
          - picolibc
          - mcuboot
    - name: astarte-device-sdk-zephyr
      remote: astarte-platform
      revision: 6b59c72c49c99b6ea2a670d788efd7a5a95d992a
      import: true
